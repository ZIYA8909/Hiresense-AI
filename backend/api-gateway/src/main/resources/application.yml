server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: recruitment-service
          uri: http://localhost:8082
          predicates:
            - Path=/recruitment/**
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/ai/**
        - id: sandbox-service
          uri: http://localhost:8084
          predicates:
            - Path=/sandbox/**
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
