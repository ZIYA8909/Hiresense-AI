server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hiresense_db
    username: hiresense
    password: password123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  jwt:
    secret: dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLWhpcmVzZW5zZS1haS1wbGF0Zm9ybS1iYWNrZW5kLXNlcnZpY2U=
    expiration-ms: 3600000 # 1 hour
    refresh-expiration-ms: 604800000 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
